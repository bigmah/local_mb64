name: Release

# Publishes the macOS launcher as a downloadable .dmg.
#
# IMPORTANT: this builds ONLY our own Rust binaries — the launcher (mb64-launcher)
# and the build orchestrator (mb64-build). It does NOT check out the game
# submodules, build the game, or touch any ROM. No Nintendo code or assets are
# fetched, built, or published here. The end user supplies their own ROM and the
# launcher clones the source + builds locally on their machine.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS launcher (.dmg)
    runs-on: macos-14 # Apple Silicon
    env:
      # Stamped into the launcher so the bundled mb64-build always matches the
      # source the launcher clones at runtime (tag name on a tag, branch on manual).
      MB64_SOURCE_REF: ${{ github.ref_name }}
    steps:
      - name: Checkout (no submodules — only the Rust crates compile here)
        uses: actions/checkout@v4

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Build launcher + orchestrator (release)
        run: cargo build --release -p mb64-launcher -p mb64-build

      - name: Package binaries (.tar.gz)
        run: bash .github/scripts/package-macos.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MarioBuilder64-Launcher-macos-arm64
          path: dist/*
          if-no-files-found: error

      - name: Attach to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/mb64-macos-arm64.tar.gz
            dist/mb64-macos-arm64.tar.gz.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            Native macOS (Apple Silicon) launcher for Mario Builder 64.

            **Install (no download prompts, nothing to sign around):**
            ```sh
            curl -fsSL https://raw.githubusercontent.com/bigmah/mb64_mac/main/install.sh | bash
            ```

            **This release contains no game or ROM** — only our launcher +
            build tooling. On first launch the app checks for the host build
            tools, clones the open-source project, and builds the game on your
            Mac from **your own** legally owned US Super Mario 64 ROM.

            The binaries are unsigned (anonymous ad-hoc only). The installer
            fetches them with `curl`, which doesn't set macOS's quarantine flag,
            so the app opens with no Gatekeeper prompt.
