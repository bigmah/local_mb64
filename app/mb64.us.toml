# First-cut N64Recomp config for Mario Builder 64 (US).
# Paths are relative to this file's location (build/rom/).
[input]
entrypoint = 0x80124330
elf_path = "mb64.elf"
output_func_path = "RecompiledFuncs"
single_file_output = false

[patches]
# libcart (N64 flashcart/SD hardware) + USB are irrelevant on PC; stub functions
# whose jump tables N64Recomp can't size. Add more here as the iteration surfaces them.
ignored = [
    "ipl3_entry",  # IPL3 boot ROM — N64ModernRuntime handles boot/ROM-load itself
]
stubs = [
    "cart_card_init",
    "cart_card_rd_cart",
    "cart_card_rd_dram",
    "cart_card_wr_cart",
    "cart_card_wr_dram",
    "cart_init",
    "cart_type",
    "ci_card_init",
    "ci_card_rd_cart",
    "ci_card_rd_dram",
    "ci_card_wr_cart",
    "ci_card_wr_dram",
    "ci_init",
    "ed_card_init",
    "ed_card_rd_cart",
    "ed_card_rd_dram",
    "ed_card_wr_cart",
    "ed_card_wr_dram",
    "ed_init",
]

# Hand-written asm stubs in .main that are NOTYPE/size-0 (entry_point, asserts,
# rounding-mode helpers, slidec decompressor). Give them sizes so N64Recomp emits them.
[[input.function_sizes]]
name = "entry_point"
size = 0x40
[[input.function_sizes]]
name = "__n64Assert"
size = 0x20
